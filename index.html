<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS SAA-C03 Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js for Markdown (Still useful for legacy data) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Quill.js for Rich Text Editing -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        /* Custom scrollbar for sidebar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="p-4 border-b border-slate-700 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i data-lucide="cloud" class="text-yellow-400"></i>
                    <h1 class="text-xl font-bold">AWS SAA-C03</h1>
                </div>
                <!-- Language Toggle -->
                <button id="lang-toggle-btn" class="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-600 transition-colors">
                    EN
                </button>
            </div>
            
            <div class="p-4">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="search-input" placeholder="Search topics..." 
                        class="w-full bg-slate-800 text-sm rounded-md pl-9 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-slate-200 placeholder-slate-400">
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-2 space-y-1" id="sidebar-nav">
                <!-- Navigation items will be injected here -->
            </nav>

            <div class="p-4 border-t border-slate-700 text-xs text-slate-400 text-center">
                AWS Certified Solutions Architect - Associate
            </div>
        </aside>

        <!-- Mobile Header -->
        <div class="md:hidden fixed w-full bg-slate-900 text-white z-50 flex items-center justify-between p-4">
            <div class="flex items-center space-x-2">
                <i data-lucide="cloud" class="text-yellow-400"></i>
                <h1 class="text-lg font-bold">AWS SAA-C03</h1>
            </div>
            <button id="mobile-menu-btn" class="p-2 rounded-md hover:bg-slate-800">
                <i data-lucide="menu"></i>
            </button>
        </div>

        <!-- Mobile Sidebar Overlay -->
        <div id="mobile-sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
        
        <!-- Mobile Sidebar -->
        <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white z-50 transform -translate-x-full transition-transform duration-300 md:hidden flex flex-col">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <span class="font-bold">Menu</span>
                <button id="close-sidebar-btn" class="p-1 hover:bg-slate-800 rounded">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="p-4">
                <input type="text" id="mobile-search-input" placeholder="Search topics..." 
                    class="w-full bg-slate-800 text-sm rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-slate-200">
            </div>
            <nav class="flex-1 overflow-y-auto p-2 space-y-1" id="mobile-sidebar-nav">
                <!-- Navigation items will be injected here -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pt-16 md:pt-0 w-full relative">
            <div class="max-w-4xl mx-auto p-6 md:p-10">
                <div id="content-area" class="prose prose-slate max-w-none">
                    <div class="text-center py-20 text-slate-500">
                        <p>Select a topic from the sidebar to view details</p>
                    </div>
                </div>
            </div>

            <!-- Add Topic FAB -->
            <button id="add-topic-btn" class="fixed bottom-6 right-6 bg-yellow-400 text-slate-900 p-4 rounded-full shadow-lg hover:bg-yellow-500 transition-colors z-30" title="Add New Topic">
                <i data-lucide="plus"></i>
            </button>
        </main>

        <!-- Add Topic Modal -->
        <div id="add-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-slate-50">
                    <h3 id="modal-title" class="text-lg font-bold text-slate-800">Add New Topic</h3>
                    <button id="close-modal-btn" class="text-gray-500 hover:text-gray-700">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto">
                    <form id="add-topic-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Title (English)</label>
                            <input type="text" id="topic-title-en" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Title (Chinese)</label>
                            <input type="text" id="topic-title-zh" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                            <select id="topic-category" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                                <option value="Compute">Compute</option>
                                <option value="Storage">Storage</option>
                                <option value="Database">Database</option>
                                <option value="Networking">Networking</option>
                                <option value="Security">Security</option>
                                <option value="Integration">Integration</option>
                                <option value="Management">Management</option>
                                <option value="Migration">Migration</option>
                                <option value="General">General</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Content (English)</label>
                                <div id="editor-container-en" class="h-64 border border-gray-300 rounded-md"></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Content (Chinese)</label>
                                <div id="editor-container-zh" class="h-64 border border-gray-300 rounded-md"></div>
                            </div>
                        </div>
                        <div class="pt-2 flex justify-end space-x-3">
                            <button type="button" id="cancel-btn" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</button>
                            <button type="submit" id="submit-btn-text" class="px-4 py-2 bg-yellow-400 text-slate-900 rounded-md hover:bg-yellow-500 font-medium">Save Topic</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Removed data.js since we fetch from API now -->
    <!-- <script src="data.js"></script> -->
    <script src="app.js"></script>
</body>
</html>
